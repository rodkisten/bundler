name: 📦 Publish browser bundle

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "vitest.config.*"
      - ".github/workflows/publish-browser-bundle.yml"
      - "!**/*.md"
      - "!docs/**"
      - "!.vscode/**"
      - "!.idea/**"
      - "!.DS_Store"

  workflow_dispatch:
    inputs:
      min_hours_between_runs:
        description: "Minimum hours between automatic builds"
        required: false
        default: "2"

concurrency:
  group: publish-browser-bundle-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

env:
  WORKFLOW_FILE: publish-browser-bundle.yml
  MIN_HOURS_BETWEEN_RUNS: 2

jobs:
  guard:
    runs-on: ubuntu-24.04

    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      reason: ${{ steps.guard.outputs.reason }}

    steps:
      - name: Decide whether this run should continue
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_FILE: ${{ env.WORKFLOW_FILE }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          DEFAULT_MIN_HOURS: ${{ env.MIN_HOURS_BETWEEN_RUNS }}
          INPUT_MIN_HOURS: ${{ github.event.inputs.min_hours_between_runs }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            MIN_HOURS="${INPUT_MIN_HOURS:-$DEFAULT_MIN_HOURS}"
          else
            MIN_HOURS="$DEFAULT_MIN_HOURS"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual_run_always_allowed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MIN_SECONDS=$((MIN_HOURS * 3600))

          RUNS_JSON="$(gh api "repos/$REPOSITORY/actions/workflows/$WORKFLOW_FILE/runs?per_page=10&status=completed")"

          LAST_TWO_CONCLUSIONS="$(echo "$RUNS_JSON" | jq -r --arg current "$CURRENT_RUN_ID" '
            .workflow_runs
            | map(select((.id | tostring) != $current))
            | .[0:2]
            | .[].conclusion
          ')"

          FAILURE_COUNT="$(echo "$LAST_TWO_CONCLUSIONS" | grep -c '^failure$' || true)"

          if [ "$FAILURE_COUNT" -eq 2 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=last_two_completed_runs_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_CREATED_AT="$(echo "$RUNS_JSON" | jq -r --arg current "$CURRENT_RUN_ID" '
            .workflow_runs
            | map(select((.id | tostring) != $current))
            | .[0].created_at // empty
          ')"

          if [ -z "$LAST_CREATED_AT" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=no_previous_completed_run" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_SECONDS="$(date -d "$LAST_CREATED_AT" +%s)"
          NOW_SECONDS="$(date +%s)"
          DIFF_SECONDS=$((NOW_SECONDS - LAST_SECONDS))

          if [ "$DIFF_SECONDS" -lt "$MIN_SECONDS" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=last_completed_run_is_too_recent" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "reason=guard_passed" >> "$GITHUB_OUTPUT"

      - name: Write guard summary
        run: |
          {
            echo "## 🛡️ Build Guard"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Should run | \`${{ steps.guard.outputs.should_run }}\` |"
            echo "| Reason | \`${{ steps.guard.outputs.reason }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    needs: guard
    if: ${{ github.event_name == 'workflow_dispatch' || needs.guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          mkdir -p artifacts/test

          pnpm test 2>&1 | tee artifacts/test/test-output.log

      - name: Write test summary
        if: always()
        run: |
          {
            echo "## 🧪 Test Report"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | \`${{ steps.tests.outcome }}\` |"
            echo "| Blocking build | \`false\` |"
            echo ""
            echo "### Last test output lines"
            echo ""
            echo '```txt'
            tail -n 80 artifacts/test/test-output.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: artifacts/test
          retention-days: 14

  build:
    needs: guard
    if: ${{ github.event_name == 'workflow_dispatch' || needs.guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-24.04

    env:
      GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
      GIST_ID: ${{ secrets.GIST_ID }}

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Build browser bundles
        run: pnpm build

      - name: Collect release assets
        id: assets
        run: |
          set -euo pipefail

          {
            echo "files<<EOF"
            find dist -type f \( \
              -name "*.js" \
              -o -name "*.js.map" \
              -o -name "*.html" \
              -o -name "*.json" \
              -o -name "*.txt" \
            \) | sort
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload browser bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-bundle
          path: dist
          retention-days: 30

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-bundle-latest
          name: Browser Bundle Latest
          body: Automated browser bundle generated from the private TypeScript repository.
          files: ${{ steps.assets.outputs.files }}
          overwrite_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish public Gist
        if: ${{ env.GIST_TOKEN != '' && env.GIST_ID != '' }}
        run: pnpm publish:gist

      - name: Write build summary
        if: always()
        run: |
          {
            echo "## 📦 Browser Bundle"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Status | \`${{ job.status }}\` |"
            echo "| Artifact | \`browser-bundle\` |"
            echo "| Release tag | \`browser-bundle-latest\` |"
            echo ""
            echo "### Published files"
            echo ""
            echo '```txt'
            find dist -type f | sort || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs:
      - guard
      - build
    if: ${{ github.event_name == 'workflow_dispatch' || needs.guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-24.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
