name: Publish browser bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  BUILD_ENTRYPOINT: src/index.ts
  BUILD_GLOBAL_NAME: Rod
  BUILD_MINIFY: false
  GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test -- --passWithNoTests

      - name: Build browser bundles
        run: pnpm build

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-bundle
          path: dist

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: browser-bundle-latest
          name: Browser Bundle Latest
          body: Automated browser bundle generated from the private TypeScript repository.
          files: |
            dist/bundle.esm.js
            dist/bundle.esm.js.map
            dist/bundle.iife.js
            dist/bundle.iife.js.map
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish public Gist
        if: ${{ env.GIST_TOKEN != '' }}
        run: pnpm publish:gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_DESCRIPTION: Public browser bundle generated from private TypeScript source

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
