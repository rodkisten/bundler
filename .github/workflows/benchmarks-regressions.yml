name: ⚡ Reliable Performance Observatory

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/benchmark-regression.yml'
  workflow_dispatch:
    inputs:
      rounds:
        description: 'Alternating baseline/current rounds'
        required: false
        default: '3'
      baseline_sha:
        description: 'Optional baseline commit; defaults to the previous benchmark-relevant commit'
        required: false
        default: ''

concurrency:
  group: reliable-benchmarks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  benchmark:
    name: 🧪 Same-runner A/B benchmark
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: 📥 Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: 🧭 Resolve source revisions
        id: revisions
        shell: bash
        env:
          INPUT_BASELINE_SHA: ${{ github.event.inputs.baseline_sha }}
          INPUT_ROUNDS: ${{ github.event.inputs.rounds }}
        run: |
          set -euo pipefail

          HEAD_SHA="$(git rev-parse HEAD)"
          HEAD_SUBJECT="$(git log -1 --pretty=%s)"
          HEAD_AUTHOR="$(git log -1 --pretty=%ae)"
          ROUNDS="${INPUT_ROUNDS:-3}"

          # Triple loop protection:
          # 1. bench/** is absent from the workflow path trigger;
          # 2. generated commits carry the marker below;
          # 3. bot-authored marker commits are rejected here as a final fuse.
          if [[ "$HEAD_SUBJECT" == chore\(bench\):\ refresh\ reliable\ baselines* ]] && \
             [[ "$HEAD_AUTHOR" == *"github-actions"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=generated_benchmark_commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -n "${INPUT_BASELINE_SHA:-}" ]]; then
            BASE_SHA="$(git rev-parse "$INPUT_BASELINE_SHA^{commit}")"
          else
            BASE_SHA="$(git log --first-parent --format=%H HEAD^ -- \
              src \
              scripts \
              package.json \
              pnpm-lock.yaml \
              pnpm-workspace.yaml \
              'tsconfig*.json' \
              .github/workflows/benchmark-regression.yml \
              | head -n 1)"
          fi

          if [[ -z "${BASE_SHA:-}" ]]; then
            BASE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          if [[ -z "${BASE_SHA:-}" ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_baseline_commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ROUNDS=$((ROUNDS < 1 ? 1 : ROUNDS > 7 ? 7 : ROUNDS))
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "reason=benchmark_relevant_source_commit" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "rounds=$ROUNDS" >> "$GITHUB_OUTPUT"

      - name: 📝 Write revision summary
        if: always()
        shell: bash
        run: |
          {
            echo '## 🧭 Benchmark revisions'
            echo
            echo '| Field | Value |'
            echo '| --- | --- |'
            echo '| Run | `${{ steps.revisions.outputs.should_run }}` |'
            echo '| Reason | `${{ steps.revisions.outputs.reason }}` |'
            echo '| Baseline | `${{ steps.revisions.outputs.base_sha }}` |'
            echo '| Current | `${{ steps.revisions.outputs.head_sha }}` |'
            echo '| Rounds | `${{ steps.revisions.outputs.rounds }}` |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Setup pnpm
        if: steps.revisions.outputs.should_run == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: 🟢 Setup Node.js
        if: steps.revisions.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: 🌿 Create baseline worktree
        if: steps.revisions.outputs.should_run == 'true'
        id: worktree
        shell: bash
        run: |
          set -euo pipefail
          BASE_ROOT="$RUNNER_TEMP/rod-benchmark-baseline"
          rm -rf "$BASE_ROOT"
          git worktree add --detach "$BASE_ROOT" '${{ steps.revisions.outputs.base_sha }}'
          echo "base_root=$BASE_ROOT" >> "$GITHUB_OUTPUT"

      - name: 📚 Install current dependencies
        if: steps.revisions.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile=false --prefer-offline

      - name: 📚 Install baseline dependencies
        if: steps.revisions.outputs.should_run == 'true'
        working-directory: ${{ steps.worktree.outputs.base_root }}
        run: pnpm install --frozen-lockfile=false --prefer-offline

      - name: 🧭 Validate current source
        if: steps.revisions.outputs.should_run == 'true'
        run: |
          pnpm typecheck
          pnpm test

      - name: ⚡ Run alternating same-runner comparison
        if: steps.revisions.outputs.should_run == 'true'
        env:
          FORCE_COLOR: '1'
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          pnpm exec tsx scripts/benchmarks.ts \
            --mode=compare \
            --baseline-root='${{ steps.worktree.outputs.base_root }}' \
            --current-root="$GITHUB_WORKSPACE" \
            --baseline-commit='${{ steps.revisions.outputs.base_sha }}' \
            --current-commit='${{ steps.revisions.outputs.head_sha }}' \
            --branch="$GITHUB_REF_NAME" \
            --rounds='${{ steps.revisions.outputs.rounds }}'

      - name: 📊 Publish job summary
        if: steps.revisions.outputs.should_run == 'true' && always()
        shell: bash
        run: |
          if [[ -f bench/COMPARISON.md ]]; then
            cat bench/COMPARISON.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo '## ⚠️ Benchmark report was not generated' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 📎 Upload benchmark evidence
        if: steps.revisions.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: reliable-benchmarks-${{ steps.revisions.outputs.head_sha }}
          path: |
            bench/*.json
            bench/*.md
          retention-days: 30

      - name: 🔒 Verify branch did not advance
        if: steps.revisions.outputs.should_run == 'true'
        id: freshness
        shell: bash
        run: |
          set -euo pipefail
          REMOTE_SHA="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | awk '{print $1}')"
          if [[ "$REMOTE_SHA" != '${{ steps.revisions.outputs.head_sha }}' ]]; then
            echo 'fresh=false' >> "$GITHUB_OUTPUT"
            echo "Branch advanced to $REMOTE_SHA; refusing to commit stale benchmark data."
            exit 0
          fi
          echo 'fresh=true' >> "$GITHUB_OUTPUT"

      - name: 💾 Commit benchmark files to the PR branch
        if: steps.revisions.outputs.should_run == 'true' && steps.freshness.outputs.fresh == 'true'
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            bench/cipo.json \
            bench/fabrica.json \
            bench/runner.json \
            bench/README.md \
            bench/COMPARISON.md

          if git diff --cached --quiet; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m 'chore(bench): refresh reliable baselines [skip benchmark]'
          git push origin "HEAD:$GITHUB_REF_NAME"
          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: 💬 Create or update PR benchmark comment
        if: steps.revisions.outputs.should_run == 'true' && always()
        uses: actions/github-script@v7
        env:
          REPORT_PATH: bench/COMPARISON.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs')
            const marker = '<!-- rod-benchmark-report -->'
            const reportPath = process.env.REPORT_PATH
            if (!fs.existsSync(reportPath)) {
              core.warning(`Missing ${reportPath}; PR comment skipped.`)
              return
            }

            const { owner, repo } = context.repo
            const branch = context.ref.replace('refs/heads/', '')
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: 'open',
              per_page: 10,
            })
            if (pulls.data.length === 0) {
              core.info(`No open pull request found for ${branch}.`)
              return
            }

            const issue_number = pulls.data[0].number
            const body = fs.readFileSync(reportPath, 'utf8')
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

      - name: 🧹 Remove baseline worktree
        if: always() && steps.worktree.outputs.base_root != ''
        shell: bash
        run: |
          git worktree remove --force '${{ steps.worktree.outputs.base_root }}' || true
          git worktree prune
